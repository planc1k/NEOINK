<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/style.css?v={{ v }}" />
{{ head_extra }}
  <style>
{{ styles }}
  </style>
</head>
<body>
  <header class="app-topbar">
    <a class="brand" href="/">
      <img class="logo-mark" src="/logo.png?v={{ v }}" alt="" />
      <span class="wordmark">NEO<span class="crossink-header">I</span>NK</span>
    </a>
    <div class="topbar-meta">
      <span class="meta-chip">SD tools</span>
      <span class="meta-chip accent">Offline UI</span>
    </div>
  </header>

  <nav class="nav-links" aria-label="Primary">
    <a href="/"{{ cls_home }}>Home</a>
    <a href="/files"{{ cls_files }}>Files</a>
    <a href="/flashcards"{{ cls_flashcards }}>Cards</a>
    <a href="/settings"{{ cls_settings }}>Settings</a>
    <a href="/fonts"{{ cls_fonts }}>Fonts</a>
  </nav>

  <main class="app-main">
{{ body }}
  </main>

  <footer class="footer">NEOINK local transfer console</footer>

{{ script }}
</body>
</html>
